server:
  port: 8082

spring:
  datasource:
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      initialization-fail-timeout: 1
      keepalive-time: 300000
  profiles:
    active: dev

mybatis-plus:
  type-aliases-package: com.wuming.user.domain
  configuration:
    map-underscore-to-camel-case: true

dubbo:
  application:
    name: user
    qos-enable: false
    serialize-check-status: WARN
  protocol:
    name: tri
    port: 50052
  registry:
    address: N/A