server:
  port: 8082

spring:
  profiles:
    active: dev
  datasource:
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      initialization-fail-timeout: 1
      connection-timeout: 30000
      validation-timeout: 3000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 120000
  config:
    import: optional:classpath:resend.properties
  mail:
    host: ${RESEND_SMTP_HOST:smtp.resend.com}
    port: ${RESEND_SMTP_PORT:465}
    username: ${RESEND_SMTP_USERNAME:resend}
    password: ${RESEND_API_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

mybatis-plus:
  type-aliases-package: com.wuming.user.domain
  configuration:
    map-underscore-to-camel-case: true

dubbo:
  application:
    name: user
    qos-enable: false
    serialize-check-status: WARN
  protocol:
    name: tri
    port: 50052
  registry:
    address: N/A


auth:
  jwt:
    enabled: ${AUTH_JWT_ENABLED:true}
    secret: ${JWT_SECRET:}
    expires-minutes: ${JWT_EXPIRES_MINUTES:60}
    refresh-expires-days: ${JWT_REFRESH_EXPIRES_DAYS:7}
    refresh-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refresh_token}
    refresh-cookie-path: ${JWT_REFRESH_COOKIE_PATH:/auth}
    refresh-cookie-same-site: ${JWT_REFRESH_COOKIE_SAME_SITE:Lax}
    refresh-cookie-secure: ${JWT_REFRESH_COOKIE_SECURE:true}
    issuer: ${JWT_ISSUER:https://novel-latest.local}

user:
  mail:
    enabled: ${USER_MAIL_ENABLED:false}
    from: ${RESEND_MAIL_FROM:}
