server:
  port: 8083

spring:
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:9379}
      password: ${REDIS_PWD:}

dubbo:
  application:
    name: rag
    qos-enable: false
    serialize-check-status: WARN
  protocol:
    name: tri
    port: 50053
  registry:
    address: N/A

rag:
  redis:
    connection-timeout-ms: ${RAG_REDIS_CONNECTION_TIMEOUT_MS:10000}
    socket-timeout-ms: ${RAG_REDIS_SOCKET_TIMEOUT_MS:60000}
    pool:
      max-total: ${RAG_REDIS_POOL_MAX_TOTAL:32}
      max-idle: ${RAG_REDIS_POOL_MAX_IDLE:16}
      min-idle: ${RAG_REDIS_POOL_MIN_IDLE:2}
  embedding:
    api-key: ${EMBEDDING_API_KEY:}
    base-url: ${EMBEDDING_BASE_URL:https://api.siliconflow.cn}
    model: ${EMBEDDING_MODEL:BAAI/bge-m3}
    dimensions: ${EMBEDDING_DIMENSIONS:1024}
  reranker:
    api-key: ${EMBEDDING_API_KEY:}
    base-url: ${RERANKER_BASE_URL:https://api.siliconflow.cn}
    model: ${RERANKER_MODEL:BAAI/bge-reranker-v2-m3}
    path: ${RERANKER_PATH:/v1/rerank}
  definition-prefix: ${RAG_DEFINITION_PREFIX:rag:index-definition:}
