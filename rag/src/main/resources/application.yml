server:
  port: 8083

spring:
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:9379}
      password: ${REDIS_PWD:}

dubbo:
  application:
    name: rag
    qos-enable: false
    serialize-check-status: WARN
  protocol:
    name: tri
    port: 50053
  registry:
    address: N/A

llm:
  temperature: ${NOVEL_LLM_TEMPERATURE:0.0}
  deepseek:
    base-url: ${DS_BASE_URL:https://api.deepseek.com}
    api-key: ${DS_API_KEY:}
    model: ${DS_MODEL:deepseek-v4-flash}

rag:
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:9379}
    password: ${REDIS_PWD:}
    database: 0
    connection-timeout-ms: 10000
    socket-timeout-ms: 60000
    pool:
      max-total: ${RAG_REDIS_POOL_MAX_TOTAL:32}
      max-idle: ${RAG_REDIS_POOL_MAX_IDLE:16}
      min-idle: ${RAG_REDIS_POOL_MIN_IDLE:2}
  embedding:
    api-key: ${EMBEDDING_API_KEY:}
    base-url: ${EMBEDDING_BASE_URL:https://api.siliconflow.cn}
    model: ${EMBEDDING_MODEL:BAAI/bge-m3}
    dimensions: ${EMBEDDING_DIMENSIONS:1024}
  reranker:
    api-key: ${EMBEDDING_API_KEY:}
    base-url: ${RERANKER_BASE_URL:https://api.siliconflow.cn}
    model: ${RERANKER_MODEL:BAAI/bge-reranker-v2-m3}
    path: ${RERANKER_PATH:/v1/rerank}
  query-rewrite:
    enabled: ${RAG_QUERY_REWRITE_ENABLED:true}
    timeout: ${RAG_QUERY_REWRITE_TIMEOUT:30s}
    max-retries: ${RAG_QUERY_REWRITE_MAX_RETRIES:1}
    multi-query-max-count: ${RAG_MULTI_QUERY_MAX_COUNT:4}
  indexes:
    novel_passage:
      physical-index-name: "idx:novel_passage"
      key-prefix: "rag:novel_passage:"
      metadata-fields:
        novel_id: NUMERIC
        chapter_id: NUMERIC
        passage_id: NUMERIC
        passage_sequence: NUMERIC
        character_names: TAG
    role_example:
      physical-index-name: "idx:role_example"
      key-prefix: "rag:role_example:"
      metadata-fields:
        character_id: NUMERIC
        example_id: NUMERIC
        passage_id: NUMERIC
        character_name: TEXT
        sample_type: TEXT
    reaction_rule:
      physical-index-name: "idx:reaction_rule"
      key-prefix: "rag:reaction_rule:"
      metadata-fields:
        character_id: NUMERIC
        rule_id: NUMERIC
        character_name: TEXT
        situation: TEXT
