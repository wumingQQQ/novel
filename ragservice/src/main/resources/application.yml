server:
  port: 8083

spring:
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:9379}
      password: ${REDIS_PWD:}

dubbo:
  application:
    name: rag
    qos-enable: false
    serialize-check-status: WARN
  protocol:
    name: tri
    port: 50053
  registry:
    address: N/A

rag:
  embedding:
    api-key: ${EMBEDDING_API_KEY:}
    base-url: https://api.botcf.com
    model: BAAI/bge-m3
    dimensions: 1024
  reranker:
    api-key: ${RERANKER_API_KEY:}
    base-url: https://api.botcf.com
    model: BAAI/bge-reranker-v2-m3
    path: /v1/rerank
