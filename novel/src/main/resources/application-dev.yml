spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/novel_dev?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never
      schema-locations: classpath:db/schema.sql

  ai:
    openai:
      api-key: ${DS_API_KEY:}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:9379}
      lettuce:
        pool:
          min-idle: 1
          max-idle: 6
          max-active: 6
          time-between-eviction-runs: 10s
      password: ${REDIS_PWD:}

llm:
  default-provider: deepseek
  temperature: 0.0
  task-temperature:
    scene-split: 0.0
    scene-pool: 0.0
    layer-split: 0.3
    evidence-extract: 0.3
    aggregation: 0.4
    profile-detail-enhance: 0.4
  providers:
    deepseek:
      base-url: https://api.deepseek.com
      api-key: ${DS_API_KEY:}
      model: deepseek-v4-flash
    mimo:
      base-url: https://api.xiaomimimo.com
      api-key: ${MIMO_API_KEY:}
      model: mimo-v2.5-pro
    agnes:
      base-url: https://apihub.agnes-ai.com
      api-key: ${AGNES_API_KEY:}
      model: agnes-2.0-flash
    qwen:
      base-url: ${ALI_BASE_URL:}
      api-key: ${ALI_API_KEY:}
      model: qwen3.5-flash

rocketmq:
  name-server: localhost:9876
  producer:
    group: novel-producer-group
    send-message-timeout: 3000

novel:
  mq:
    enabled: true
    topic: novel
    tags:
      job-finished: job_finished
      single-chapter-split-completed: scene_split_completed

