spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:novel_dev}?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&connectTimeout=10000&socketTimeout=30000&tcpKeepAlive=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never
      schema-locations: classpath:db/schema.sql

  ai:
    openai:
      api-key: ${DS_API_KEY:}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:9379}
      lettuce:
        pool:
          min-idle: 1
          max-idle: 6
          max-active: 6
          time-between-eviction-runs: 10s
      password: ${REDIS_PWD:}

llm:
  temperature: 0.0
  deepseek:
    base-url: ${DS_BASE_URL:https://api.deepseek.com}
    api-key: ${DS_API_KEY:}
    model: deepseek-v4-flash

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: novel-producer-group
    send-message-timeout: 3000

novel:
  mq:
    enabled: true
