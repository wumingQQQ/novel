spring:
  datasource:
    url: jdbc:h2:file:./data/test/h2-test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:test/schema.sql

novel:
  upload:
    save-path: data/test
  recall:
    threshold: 0.1

llm:
  default-provider: deepseek
  temperature: 0.0
  task-temperature:
    scene-split: 0.4
    scene-pool: 0.0
    layer-split: 0.5
    evidence-extract: 0.7
    aggregation: 0.8