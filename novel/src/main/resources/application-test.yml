spring:
  datasource:
    url: jdbc:h2:file:./data/test/h2-test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:test/schema.sql
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:9379}
      password: ${REDIS_PWD:}
      lettuce:
        pool:
          min-idle: 1
          max-idle: 6
          max-active: 6
          time-between-eviction-runs: 10s
novel:
  upload:
    save-path: data/test
  mq:
    enabled: true

llm:
  temperature: 1.0
  deepseek:
    base-url: ${DS_BASE_URL:https://api.deepseek.com}
    api-key: ${DS_API_KEY:}
    model: deepseek-v4-flash

auth:
  jwt:
    enabled: false

dubbo:
  consumer:
    check: false
    lazy: true

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: novel-test-producer-group
    send-message-timeout: 3000
