spring:
  profiles:
    active: dev
  datasource:
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      initialization-fail-timeout: 1
      connection-timeout: 30000
      validation-timeout: 3000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 120000
  servlet:
    multipart:
      max-file-size: 50MB
  config:
    import: optional:classpath:tencent-cos.properties

mybatis-plus:
  type-aliases-package: com.wuming.novel.domain
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  mapper-locations: classpath*:/mapper/**/*.xml

dubbo:
  application:
    name: novel
    qos-enable: false
    serialize-check-status: WARN
  protocol:
    name: tri
    port: 50051
  registry:
    address: N/A

novel:
  upload:
    max-file-size: 10MB
    save-path: data/novel
  storage:
    type: ${NOVEL_STORAGE_TYPE:local}
    cos:
      secret-id: ${TENCENT_COS_SECRET_ID:}
      secret-key: ${TENCENT_COS_SECRET_KEY:}
      region: ${TENCENT_COS_REGION:}
      bucket-name: ${TENCENT_COS_BUCKET_NAME:}
      key-prefix: ${TENCENT_COS_KEY_PREFIX:novels}
      connection-timeout-ms: ${TENCENT_COS_CONNECTION_TIMEOUT_MS:30000}
      socket-timeout-ms: ${TENCENT_COS_SOCKET_TIMEOUT_MS:30000}
  analysis:
    batch-size: 10
  task:
    default-page-size: 5
    max-page-size: 8
  llm:
    max-concurrency: ${NOVEL_LLM_MAX_CONCURRENCY:2000} # deepseek-v4-flash 限流2500
  passage:
    split-strategy: SLIDING_WINDOW
    window-size: 15
    overlap-size: 3
  role-example:
    max-candidate-passages: 80
    min-confidence: 0.6
  rag:
    url: ${RAG_SERVICE_URL:tri://127.0.0.1:50053}
    passage-index-name: ${NOVEL_PASSAGE_INDEX_NAME:novel_passage}
    role-example-index-name: ${ROLE_EXAMPLE_INDEX_NAME:role_example}
    reaction-rule-index-name: ${REACTION_RULE_INDEX_NAME:reaction_rule}
    vector-batch-size: ${NOVEL_VECTOR_BATCH_SIZE:32}

auth:
  jwt:
    enabled: ${AUTH_JWT_ENABLED:true}
    secret: ${JWT_SECRET:}
    expires-minutes: ${JWT_EXPIRES_MINUTES:120}
    issuer: ${JWT_ISSUER:https://novel-latest.local}


