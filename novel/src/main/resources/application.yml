spring:
  datasource:
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      initialization-fail-timeout: 1
      connection-timeout: 30000
      validation-timeout: 3000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 120000
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 50MB

mybatis-plus:
  type-aliases-package: com.wuming.novel.domain
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  mapper-locations: classpath*:/mapper/**/*.xml

dubbo:
  application:
    name: novel
    qos-enable: false
    serialize-check-status: WARN
  protocol:
    name: tri
    port: 50051
  registry:
    address: N/A

novel:
  upload:
    max-file-size: 10MB
    save-path: data/novel
  analysis:
    batch-size: 10
  llm:
    max-concurrency: 2000   #  deepseek-v4-flash 限流2500
  passage:
    split-strategy: SLIDING_WINDOW
    window-size: 15
    overlap-size: 3
  role-example:
    max-candidate-passages: 80
    min-confidence: 0.6
  rag:
    url: ${RAG_SERVICE_URL:tri://127.0.0.1:50053}
    passage-index-name: novel_passage
    vector-batch-size: 32

auth:
  jwt:
    enabled: ${AUTH_JWT_ENABLED:false}
    secret: ${JWT_SECRET:dev-only-secret-key-must-be-long-enough}
    expires-minutes: 120
    issuer: https://novel-latest.local


