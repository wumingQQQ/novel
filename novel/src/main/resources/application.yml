spring:
  profiles:
    active: dev
  datasource:
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      initialization-fail-timeout: 1
      connection-timeout: 30000
      validation-timeout: 3000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 120000
  servlet:
    multipart:
      max-file-size: 50MB
  config:
    import: optional:classpath:tencent-cos.properties

mybatis-plus:
  type-aliases-package: com.wuming.novel.domain
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  mapper-locations: classpath*:/mapper/**/*.xml

dubbo:
  application:
    name: novel
    qos-enable: false
    serialize-check-status: WARN
  protocol:
    name: tri
    port: 50051
  registry:
    address: N/A

novel:
  upload:
    max-file-size: 10MB
    save-path: data/novel
  storage:
    type: ${NOVEL_STORAGE_TYPE:local}
    cos:
      secret-id: ${TENCENT_COS_SECRET_ID:}
      secret-key: ${TENCENT_COS_SECRET_KEY:}
      region: ${TENCENT_COS_REGION:}
      bucket-name: ${TENCENT_COS_BUCKET_NAME:}
      key-prefix: ${TENCENT_COS_KEY_PREFIX:novels}
      connection-timeout-ms: ${TENCENT_COS_CONNECTION_TIMEOUT_MS:30000}
      socket-timeout-ms: ${TENCENT_COS_SOCKET_TIMEOUT_MS:30000}
  analysis:
    batch-size: 10
  llm:
    max-concurrency: 2000   #  deepseek-v4-flash 限流2500
  passage:
    split-strategy: SLIDING_WINDOW
    window-size: 15
    overlap-size: 3
  role-example:
    max-candidate-passages: 80
    min-confidence: 0.6
  role-evaluation:
    prompt-version: v1
    role-example-top-k: 10
    role-example-top-n: 3
    case-candidate-pool-size: 24
    case-candidate-pool-multiplier: 4
    rule-improvement-threshold: 3.0
    rule-improvement-max-runs: 12
    rule-improvement-max-changes: 2
  rag:
    url: ${RAG_SERVICE_URL:tri://127.0.0.1:50053}
    passage-index-name: novel_passage
    role-example-index-name: role_example
    reaction-rule-index-name: reaction_rule
    vector-batch-size: 32

auth:
  jwt:
    enabled: ${AUTH_JWT_ENABLED:true}
    secret: ${JWT_SECRET:}
    expires-minutes: 120
    issuer: https://novel-latest.local


