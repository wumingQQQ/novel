spring:
  datasource:
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      initialization-fail-timeout: 1
      connection-timeout: 30000
      validation-timeout: 3000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 120000
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 50MB

mybatis-plus:
  type-aliases-package: com.wuming.novel.domain
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  mapper-locations: classpath*:/mapper/**/*.xml

dubbo:
  application:
    name: novel
    qos-enable: false
    serialize-check-status: WARN
  protocol:
    name: tri
    port: 50051
  registry:
    address: N/A

novel:
  upload:
    max-file-size: 10MB
    save-path: data/novel
  layer:
    min-chapter-per-layer: 15
    max-chapter-per-layer: 35
    max-layer-size: 30
  recall:
    threshold: 0.6
    topK: 40
  profile-enhance:
    threshold: 0.7
    default-top-k: 10
    top-k:
      SETTING: 10
      PERSONALITY: 15
      SPEECH: 20
      INTERACTION: 20
      KEY_EVENT: 15
    batch-size: 5
  analysis:
    batch-size: 10

auth:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-must-be-long-enough}
    expires-minutes: 120
    issuer: https://novel-latest.local


