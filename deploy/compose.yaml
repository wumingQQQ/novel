services:
  mysql:
    image: "mysql:8.4"
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-novel}"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis-stack:
    image: "redis/redis-stack-server:7.2.0-v10"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  rocketmq-namesrv:
    image: "apache/rocketmq:5.3.2"
    restart: unless-stopped
    command: sh mqnamesrv
    environment:
      JAVA_OPT_EXT: "-Xms128m -Xmx256m -Xmn128m"

  rocketmq-broker:
    image: "apache/rocketmq:5.3.2"
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/broker.conf
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx768m -Xmn256m"
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/broker.conf:ro
      - rocketmq-store:/home/rocketmq/store

  rocketmq-init:
    image: "apache/rocketmq:5.3.2"
    depends_on:
      - rocketmq-broker
    command:
      - sh
      - -c
      - |
        until sh mqadmin updateTopic -n rocketmq-namesrv:9876 -b rocketmq-broker:10911 -t novel -r 8 -w 8; do sleep 3; done
    restart: "no"

  user:
    build:
      context: .
      dockerfile: Dockerfile.app
      args: { MODULE: user }
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rocketmq-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_SQL_INIT_MODE: always
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-novel}"
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ""
      ROCKETMQ_NAME_SERVER: rocketmq-namesrv:9876
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      JWT_ISSUER: "${JWT_ISSUER:-http://localhost}"
      USER_MAIL_ENABLED: "${USER_MAIL_ENABLED:-false}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      RESEND_MAIL_FROM: "${RESEND_MAIL_FROM:-}"

  rag:
    build:
      context: .
      dockerfile: Dockerfile.app
      args: { MODULE: rag }
    restart: unless-stopped
    depends_on:
      redis-stack:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      REDIS_HOST: redis-stack
      REDIS_PORT: "6379"
      REDIS_PWD: ""
      DS_API_KEY: "${DS_API_KEY:?DS_API_KEY must be set}"
      DS_BASE_URL: "${DS_BASE_URL:-https://api.deepseek.com}"
      DS_MODEL: "${DS_MODEL:-deepseek-v4-flash}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:?EMBEDDING_API_KEY must be set}"
      EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-https://api.siliconflow.cn}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-BAAI/bge-m3}"
      RERANKER_BASE_URL: "${RERANKER_BASE_URL:-https://api.siliconflow.cn}"
      RERANKER_MODEL: "${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}"

  novel:
    build:
      context: .
      dockerfile: Dockerfile.app
      args: { MODULE: novel }
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis-stack:
        condition: service_healthy
      rocketmq-init:
        condition: service_completed_successfully
      rag:
        condition: service_started
      user:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_SQL_INIT_MODE: always
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-novel}"
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ""
      REDIS_HOST: redis-stack
      REDIS_PORT: "6379"
      REDIS_PWD: ""
      ROCKETMQ_NAME_SERVER: rocketmq-namesrv:9876
      USER_SERVICE_URL: tri://user:50052
      RAG_SERVICE_URL: tri://rag:50053
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      JWT_ISSUER: "${JWT_ISSUER:-http://localhost}"
      DS_API_KEY: "${DS_API_KEY:?DS_API_KEY must be set}"
      DS_BASE_URL: "${DS_BASE_URL:-https://api.deepseek.com}"
      DS_MODEL: "${DS_MODEL:-deepseek-v4-flash}"
      NOVEL_LLM_MAX_CONCURRENCY: "${NOVEL_LLM_MAX_CONCURRENCY:-20}"
      NOVEL_STORAGE_TYPE: "${NOVEL_STORAGE_TYPE:-local}"
      # 如果storage type填的时cos才需要补充以下配置
      TENCENT_COS_SECRET_ID: "${TENCENT_COS_SECRET_ID:-}"
      TENCENT_COS_SECRET_KEY: "${TENCENT_COS_SECRET_KEY:-}"
      TENCENT_COS_REGION: "${TENCENT_COS_REGION:-}"
      TENCENT_COS_BUCKET_NAME: "${TENCENT_COS_BUCKET_NAME:-}"
      TENCENT_COS_KEY_PREFIX: "${TENCENT_COS_KEY_PREFIX:-novels}"
      TENCENT_COS_CONNECTION_TIMEOUT_MS: "${TENCENT_COS_CONNECTION_TIMEOUT_MS:-120000}"
      TENCENT_COS_SOCKET_TIMEOUT_MS: "${TENCENT_COS_SOCKET_TIMEOUT_MS:-120000}"
    volumes:
      - novel-data:/app/data/novel

  chat:
    build:
      context: .
      dockerfile: Dockerfile.app
      args: { MODULE: chat }
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis-stack:
        condition: service_healthy
      rocketmq-init:
        condition: service_completed_successfully
      user:
        condition: service_started
      rag:
        condition: service_started
      novel:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_SQL_INIT_MODE: always
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-novel}"
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ""
      REDIS_HOST: redis-stack
      REDIS_PORT: "6379"
      REDIS_PWD: ""
      ROCKETMQ_NAME_SERVER: rocketmq-namesrv:9876
      USER_SERVICE_URL: tri://user:50052
      NOVEL_SERVICE_URL: tri://novel:50051
      RAG_SERVICE_URL: tri://rag:50053
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      JWT_ISSUER: "${JWT_ISSUER:-http://localhost}"
      DS_API_KEY: "${DS_API_KEY:?DS_API_KEY must be set}"
      DS_BASE_URL: "${DS_BASE_URL:-https://api.deepseek.com}"
      DS_MODEL: "${DS_MODEL:-deepseek-v4-flash}"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - user
      - novel
      - chat
    environment:
      USER_UPSTREAM: user:8082
      NOVEL_UPSTREAM: novel:8080
      CHAT_UPSTREAM: chat:8081
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  mysql-data:
  redis-data:
  rocketmq-store:
  novel-data:
