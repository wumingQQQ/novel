server:
  port: 8081

spring:
  datasource:
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      initialization-fail-timeout: 1
      keepalive-time: 300000
  profiles:
    active: dev

mybatis-plus:
  type-aliases-package: com.wuming.chat.domain
  configuration:
    map-underscore-to-camel-case: true

dubbo:
  application:
    name: chat
    qos-enable: false
    serialize-check-status: WARN
  registry:
    address: N/A


chat:
  history-limit: 20
  message-cache-ttl: 3d
  profile-prompt-cache-ttl: 3d
