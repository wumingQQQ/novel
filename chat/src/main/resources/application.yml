server:
  port: 8081

spring:
  datasource:
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      initialization-fail-timeout: 1
      connection-timeout: 30000
      validation-timeout: 3000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 120000
  profiles:
    active: dev

mybatis-plus:
  type-aliases-package: com.wuming.chat.domain
  configuration:
    map-underscore-to-camel-case: true

dubbo:
  application:
    name: chat
    qos-enable: false
    serialize-check-status: WARN
  registry:
    address: N/A


chat:
  history-limit: 20
  message-cache-ttl: 3d
  rpc-cache-ttl: 2h
  role-runtime:
    url: ${NOVEL_SERVICE_URL:tri://127.0.0.1:50051}
  rag:
    url: ${RAG_SERVICE_URL:tri://127.0.0.1:50053}
    role-example-index-name: role_example
    reaction-rule-index-name: reaction_rule
    role-example-top-k: 10
    role-example-top-n: 3
    reaction-rule-top-k: 8
    reaction-rule-top-n: 2

auth:
  jwt:
    enabled: ${AUTH_JWT_ENABLED:false}
    secret: ${JWT_SECRET:dev-only-secret-key-must-be-long-enough}
    expires-minutes: 120
    issuer: https://novel-latest.local

