server:
  port: 8081

spring:
  profiles:
    active: dev
  datasource:
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      initialization-fail-timeout: 1
      connection-timeout: 30000
      validation-timeout: 3000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 120000
mybatis-plus:
  type-aliases-package: com.wuming.chat.domain
  configuration:
    map-underscore-to-camel-case: true

dubbo:
  application:
    name: chat
    qos-enable: false
    serialize-check-status: WARN
  registry:
    address: N/A


chat:
  sse:
    timeout: ${CHAT_SSE_TIMEOUT:10m}
    max-concurrent-streams: ${CHAT_SSE_MAX_CONCURRENT_STREAMS:32}
  memory:
    recent-message-limit: ${CHAT_MEMORY_RECENT_MESSAGE_LIMIT:16}
    summary-trigger-message-count: ${CHAT_MEMORY_SUMMARY_TRIGGER_MESSAGE_COUNT:24}
  message-cache-ttl: ${CHAT_MESSAGE_CACHE_TTL:3d}
  rpc-cache-ttl: ${CHAT_RPC_CACHE_TTL:2h}
  role-runtime:
    url: ${NOVEL_SERVICE_URL:tri://127.0.0.1:50051}
  rag:
    url: ${RAG_SERVICE_URL:tri://127.0.0.1:50053}
    role-example-index-name: role_example
    reaction-rule-index-name: reaction_rule
    role-example-top-k: 10
    role-example-top-n: 3
    reaction-rule-top-k: 8
    reaction-rule-top-n: 2

auth:
  jwt:
    enabled: ${AUTH_JWT_ENABLED:true}
    secret: ${JWT_SECRET:}
    expires-minutes: ${JWT_EXPIRES_MINUTES:120}
    issuer: ${JWT_ISSUER:https://novel-latest.local}

