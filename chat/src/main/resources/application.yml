server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/novel?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  ai:
    openai:
      api-key: ${DS_API_KEY:}

llm:
  default-provider: deepseek
  temperature: 0.6
  task-temperature:
    role-chat: 0.6
  providers:
    deepseek:
      base-url: https://api.deepseek.com
      api-key: ${DS_API_KEY:}
      model: deepseek-v4-flash
    mimo:
      base-url: https://api.xiaomimimo.com
      api-key: ${MIMO_API_KEY:}
      model: mimo-v2.5-pro
    agnes:
      base-url: https://apihub.agnes-ai.com
      api-key: ${AGNES_API_KEY:}
      model: agnes-2.0-flash
    qwen:
      base-url: ${ALI_BASE_URL:}
      api-key: ${ALI_API_KEY:}
      model: qwen3.5-flash

mybatis-plus:
  type-aliases-package: com.wuming.chat.domain
  configuration:
    map-underscore-to-camel-case: true

chat:
  history-limit: 20
