server:
  port: 8081

spring:
  profiles:
    active: dev

mybatis-plus:
  type-aliases-package: com.wuming.chat.domain
  configuration:
    map-underscore-to-camel-case: true

dubbo:
  application:
    name: chat
  registry:
    address: N/A

chat:
  history-limit: 20
  message-cache-ttl: 3d
  profile-prompt-cache-ttl: 3d
