spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:novel_dev}?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&connectTimeout=10000&socketTimeout=30000&tcpKeepAlive=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never
      schema-locations: classpath:db/schema.sql


  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:9379}
      password: ${REDIS_PWD:}

llm:
  temperature: 0.6
  deepseek:
    base-url: ${DS_BASE_URL:https://api.deepseek.com}
    api-key: ${DS_API_KEY:}
    model: deepseek-v4-flash

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  consumer:
    group: chat-scene-consumer-group

auth:
  jwt:
    secret: ${JWT_SECRET:local-development-jwt-secret-minimum-32-bytes}
