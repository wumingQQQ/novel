services:
  mysql:
    image: mysql:8.4
    container_name: novel-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: novel_dev
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - novel-mysql-data:/var/lib/mysql

  redis-stack:
    image: redis/redis-stack-server:7.2.0-v10
    container_name: novel-redis-stack
    ports:
      - "9379:6379"
    volumes:
      - novel-redis-data:/data

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.2
    container_name: novel-rocketmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    container_name: novel-rocketmq-broker
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/broker.conf
    ports:
      - "10911:10911"
    volumes:
      - ./deploy/rocketmq/broker.local.conf:/home/rocketmq/broker.conf:ro
      - novel-rocketmq-store:/home/rocketmq/store

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile.local
    container_name: novel-nginx
    profiles:
      - web
    ports:
      - "8088:80"
    environment:
      USER_UPSTREAM: host.docker.internal:8082
      NOVEL_UPSTREAM: host.docker.internal:8080
      CHAT_UPSTREAM: host.docker.internal:8081
    # 让 Linux Docker 与 Docker Desktop 均可通过相同主机名访问宿主机 Java 服务。
    extra_hosts:
      - host.docker.internal:host-gateway

volumes:
  novel-mysql-data:
  novel-redis-data:
  novel-rocketmq-store:
